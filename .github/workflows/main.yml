name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # PR-only: rebuild Image/rootfs.cpio from source when local kernel
  # and rootfs inputs have drifted from the prebuilt's recorded inputs.
  # Without this, make check on a PR that touches configs, scripts, or
  # target would silently exercise the stale prebuilt instead of the
  # contributor's actual change.
  #
  # The artifacts produced here are published as a workflow artifact
  # (reliable cross-job and cross-runner handoff) and consumed by the
  # test jobs below. They are NOT published to the prebuilt GitHub
  # release; that path is owned by .github/workflows/prebuilt.yml on
  # master push.
  #
  # The job always runs but short-circuits unless this is a PR with
  # drifted inputs, so non-drifting PRs and master pushes pay only the
  # cost of a checkout plus drift check.
  pr-prebuilt-build:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: detect input drift
      id: detect
      shell: bash
      run: |
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "should_build=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # The prebuilt's input-fingerprint lives on the release as the
        # third line of prebuilt.sha1 (virtual name 'inputs'). Pull it
        # from there instead of mirroring it in the source tree.
        manifest_url="https://github.com/sysprog21/semu/releases/download/prebuilt/prebuilt.sha1"
        curl --fail --silent --show-error --retry 3 --retry-delay 1 \
          -L -o prebuilt.sha1 "$manifest_url"
        expected=$(awk '$2 == "inputs" {print $1}' prebuilt.sha1)
        if [ -z "$expected" ]; then
          # Manifest predates the inputs line (transition window after
          # this workflow lands). Skip drift detection until prebuilt.yml
          # republishes with the new format; treat as no drift to avoid
          # gratuitous 90-minute from-source rebuilds on every PR.
          echo "manifest has no inputs hash yet; skipping drift detection"
          echo "should_build=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        live=$(cat \
          configs/linux.config \
          configs/busybox.config \
          configs/buildroot.config \
          scripts/build-image.sh \
          scripts/rootfs_ext4.sh \
          target/init \
          | sha1sum | awk '{print $1}')
        if [ "$live" = "$expected" ]; then
          echo "PR inputs match the prebuilt ($live); skipping rebuild"
          echo "should_build=false" >> "$GITHUB_OUTPUT"
        else
          echo "PR inputs drifted ($live != $expected); will rebuild from source"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
        fi
    - name: install build dependencies
      if: steps.detect.outputs.should_build == 'true'
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          bc bison flex cpio fakeroot e2fsprogs \
          git python3 libssl-dev libelf-dev wget
      timeout-minutes: 5
    - name: build kernel and rootfs from source
      if: steps.detect.outputs.should_build == 'true'
      run: ./scripts/build-image.sh --all
      timeout-minutes: 90
    - name: upload PR-built artifacts
      if: steps.detect.outputs.should_build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: prebuilt-pr
        path: |
          Image
          rootfs.cpio
        retention-days: 1
        if-no-files-found: error

  semu-linux:
    needs: pr-prebuilt-build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dependency:
          - none
          - libpulse-dev
          - libjack-jackd2-dev
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    # Drift PR: pull the freshly-built Image/rootfs.cpio from
    # pr-prebuilt-build via workflow artifact (reliable, not cache).
    - name: download PR-built kernel/rootfs
      if: needs.pr-prebuilt-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: prebuilt-pr
    # Non-drift PR or master push: cache the release-downloaded artifacts
    # across runs. Include mk/external.mk so checksum or input-pin bumps
    # after a republish invalidate the old Image/rootfs.cpio pair.
    - name: cache external downloads
      if: needs.pr-prebuilt-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: install sound multiplexer ${{ matrix.dependency }}
      if: matrix.dependency != 'none'
      run: |
            sudo apt-get install -y ${{ matrix.dependency }}
      timeout-minutes: 5
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 5
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 10
    - name: netdev test
      run: sudo .ci/test-netdev.sh
      shell: bash
      timeout-minutes: 10
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 5

  # Guard the legacy initramfs path so it does not bitrot now that the
  # default boot mode is /dev/vda. Single slim job: fresh build with
  # ENABLE_EXTERNAL_ROOT=0, then run autorun.
  semu-linux-initramfs:
    needs: pr-prebuilt-build
    runs-on: ubuntu-24.04
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: download PR-built kernel/rootfs
      if: needs.pr-prebuilt-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: prebuilt-pr
    - name: cache external downloads
      if: needs.pr-prebuilt-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: legacy initramfs build
      run: make ENABLE_EXTERNAL_ROOT=0
      shell: bash
      timeout-minutes: 5
    - name: legacy initramfs autorun
      run: ENABLE_EXTERNAL_ROOT=0 .ci/autorun.sh
      shell: bash
      timeout-minutes: 10

  semu-macOS:
    needs: pr-prebuilt-build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # macOS cannot run buildroot. On a drift PR it must consume
    # pr-prebuilt-build's artifact (built on a linux runner) -- a cache
    # miss here would silently fall back to downloading the stale
    # release, defeating the whole point of the drift-detection logic.
    - name: download PR-built kernel/rootfs
      if: needs.pr-prebuilt-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: prebuilt-pr
    - name: cache external downloads
      if: needs.pr-prebuilt-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 20
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 20
    - name: netdev test
      # NOTE: vmnet requires sudo privileges which may not be available in GitHub Actions
      # This test is conditional and will be skipped if sudo is not available
      run: |
            if sudo -n true 2>/dev/null; then
              echo "sudo available, running netdev test"
              sudo .ci/test-netdev.sh
            else
              echo "Skipping netdev test: sudo not available in GitHub Actions runner"
              echo "vmnet.framework requires root privileges or com.apple.vm.networking entitlement"
            fi
      shell: bash
      timeout-minutes: 20
      if: ${{ success() }}
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 20

  coding_style:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-clang-format-20
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: Install clang-format
      run: |
            sudo apt-get update
            sudo apt-get install -q -y clang-format-20
      shell: bash
      timeout-minutes: 5
    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1
      if: github.event_name == 'pull_request'
      with:
        reviewdog_version: latest
      timeout-minutes: 5
    - name: Run clang-format with reviewdog
      if: github.event_name == 'pull_request'
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: .ci/suggest-format.sh
      shell: bash
      timeout-minutes: 5
    - name: Check formatting (fail on violations)
      run: .ci/check-format.sh
      shell: bash
      timeout-minutes: 5
