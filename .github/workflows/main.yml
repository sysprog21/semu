name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  semu-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dependency:
          - none
          - libpulse-dev
          - libjack-jackd2-dev
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache external downloads
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        # Invalidate the cached prebuilts whenever any input that defines
        # their content changes. Keep this list in sync with
        # PREBUILT_INPUTS in mk/external.mk and the `paths:` filter in
        # .github/workflows/prebuilt.yml; otherwise CI will silently
        # restore stale Image / rootfs.cpio after a config bump.
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: install sound multiplexer ${{ matrix.dependency }}
      if: matrix.dependency != 'none'
      run: |
            sudo apt-get install -y ${{ matrix.dependency }}
      timeout-minutes: 5
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 5
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 10
    - name: netdev test
      run: sudo .ci/test-netdev.sh
      shell: bash
      timeout-minutes: 10
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 5

  # Guard the legacy initramfs path so it does not bitrot now that the
  # default boot mode is /dev/vda. Single slim job: fresh build with
  # ENABLE_EXTERNAL_ROOT=0, then run autorun.
  semu-linux-initramfs:
    runs-on: ubuntu-24.04
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache external downloads
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        # Invalidate the cached prebuilts whenever any input that defines
        # their content changes. Keep this list in sync with
        # PREBUILT_INPUTS in mk/external.mk and the `paths:` filter in
        # .github/workflows/prebuilt.yml; otherwise CI will silently
        # restore stale Image / rootfs.cpio after a config bump.
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: legacy initramfs build
      run: make ENABLE_EXTERNAL_ROOT=0
      shell: bash
      timeout-minutes: 5
    - name: legacy initramfs autorun
      run: ENABLE_EXTERNAL_ROOT=0 .ci/autorun.sh
      shell: bash
      timeout-minutes: 10

  semu-macOS:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache external downloads
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
        # Invalidate the cached prebuilts whenever any input that defines
        # their content changes. Keep this list in sync with
        # PREBUILT_INPUTS in mk/external.mk and the `paths:` filter in
        # .github/workflows/prebuilt.yml; otherwise CI will silently
        # restore stale Image / rootfs.cpio after a config bump.
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 20
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 20
    - name: netdev test
      # NOTE: vmnet requires sudo privileges which may not be available in GitHub Actions
      # This test is conditional and will be skipped if sudo is not available
      run: |
            if sudo -n true 2>/dev/null; then
              echo "sudo available, running netdev test"
              sudo .ci/test-netdev.sh
            else
              echo "Skipping netdev test: sudo not available in GitHub Actions runner"
              echo "vmnet.framework requires root privileges or com.apple.vm.networking entitlement"
            fi
      shell: bash
      timeout-minutes: 20
      if: ${{ success() }}
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 20

  coding_style:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-clang-format-20
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: Install clang-format
      run: |
            sudo apt-get update
            sudo apt-get install -q -y clang-format-20
      shell: bash
      timeout-minutes: 5
    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1
      if: github.event_name == 'pull_request'
      with:
        reviewdog_version: latest
      timeout-minutes: 5
    - name: Run clang-format with reviewdog
      if: github.event_name == 'pull_request'
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: .ci/suggest-format.sh
      shell: bash
      timeout-minutes: 5
    - name: Check formatting (fail on violations)
      run: .ci/check-format.sh
      shell: bash
      timeout-minutes: 5
